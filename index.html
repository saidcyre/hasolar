<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EletroCyre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh; /* dvh = dynamic viewport height, desconta a barra do browser */
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    src="https://script.google.com/macros/s/AKfycbyNx7Mq74-kOTdNygNWiQmP18hrO5lw_FRz8zPb_DXF9bPm8pnIxHQPZAd7Xag3VUym/exec"
    allow="geolocation; camera; microphone"
    allowfullscreen>
  </iframe>
</body>
</html>
